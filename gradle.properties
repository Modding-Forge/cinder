# JVM settings - keep these aligned with Loom 1.16-SNAPSHOT / MC 26.2 expectations.
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true
# Loom 1.16 still has known issues with the configuration cache; leave disabled.
org.gradle.configuration-cache=false

# Java release target. The Argus source code is written to be source-compatible
# with Java 21+. Mojang 26.2 requires Java 25+ at runtime, and the dev
# environment now has a 25 JDK, so we pin to 25. The `compatibilityLevel` in
# mixin configs follows this number.
java_release=25

# === Identity ===
# Mod ID for the produced jar (`fabric.mod.json.id`, `assets/argus/`, mixin package, logger).
mod_id=argus

# === Versions ===
minecraft_version=26.2
loader_version=0.19.3
loom_version=1.16-SNAPSHOT
fabric_api_version=0.150.3+26.2
neo_version=26.2.0.0-beta
minecraft_version_range=[26.2]
sodium_neoforge_version=0.9.0+mc26.2
sodium_version_range=[0.9.0,)

mod_version=0.8.5
maven_group=com.argus
