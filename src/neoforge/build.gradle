plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = "${project.mod_id}-neoforge"
}

java.toolchain.languageVersion = JavaLanguageVersion.of(
        project.java_release as int)

sourceSets {
    main {
        java.srcDir rootProject.file('src/client/src/main/java')
        resources.srcDir rootProject.file('src/client/src/main/resources')
    }
}

repositories {
    maven {
        name = 'CaffeineMC'
        url = 'https://maven.caffeinemc.net/releases'
    }
    mavenCentral()
}

neoForge {
    version = project.neo_version

    runs {
        client {
            client()
            gameDirectory = project.file('run')
            systemProperty 'neoforge.enabledGameTestNamespaces',
                    project.mod_id
        }
        configureEach {
            logLevel = org.slf4j.event.Level.INFO
        }
    }

    mods {
        "${project.mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

configurations {
    runtimeClasspath.extendsFrom localRuntime
    sodiumNestedCompile
}

dependencies {
    implementation project(':src:shared')
    sodiumNestedCompile "net.caffeinemc:sodium-neoforge:${project.sodium_neoforge_version}"
    implementation "net.caffeinemc:sodium-neoforge:${project.sodium_neoforge_version}"
    implementation 'io.github.llamalad7:mixinextras-neoforge:0.5.4'
}

def extractedSodiumJar = layout.buildDirectory.file(
        "extracted/META-INF/jarjar/sodium-neoforge-mod.jar")

tasks.register('extractSodiumNeoForgeModJar', Copy) {
    from {
        zipTree(configurations.sodiumNestedCompile.singleFile)
    }
    include 'META-INF/jarjar/*-mod.jar'
    rename { 'sodium-neoforge-mod.jar' }
    into layout.buildDirectory.dir("extracted")
}

dependencies {
    compileOnly files(extractedSodiumJar)
}

tasks.named('compileJava') {
    dependsOn tasks.named('extractSodiumNeoForgeModJar')
}

var generateModMetadata = tasks.register("generateModMetadata",
        ProcessResources) {
    var replaceProperties = [
            minecraft_version      : project.minecraft_version,
            minecraft_version_range: project.minecraft_version_range,
            neo_version            : project.neo_version,
            sodium_version_range   : project.sodium_version_range,
            mod_id                 : project.mod_id,
            mod_name               : 'Argus',
            mod_license            : 'PolyForm-Shield-1.0.0',
            mod_version            : project.mod_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into layout.buildDirectory.dir("generated/sources/modMetadata")
}

sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

def fabricSavesDir = rootProject.file('src/fabric/run/saves')
def neoforgeSavesDir = project.file('run/saves')

tasks.register('syncNeoForgeSavesWithFabric') {
    group = 'development'
    description = 'Dev-only: links NeoForge saves to the Fabric run saves folder.'

    doLast {
        if (!fabricSavesDir.exists()) {
            fabricSavesDir.mkdirs()
        }
        if (neoforgeSavesDir.exists()) {
            if (neoforgeSavesDir.canonicalFile == fabricSavesDir.canonicalFile) {
                return
            }
            def existing = neoforgeSavesDir.toPath()
            if (java.nio.file.Files.isSymbolicLink(existing)) {
                java.nio.file.Files.delete(existing)
            } else {
                def attrs = java.nio.file.Files.readAttributes(
                        existing,
                        java.nio.file.attribute.BasicFileAttributes)
                if (attrs.isOther()) {
                    return
                }
                def backup = project.file("run/saves.backup-${new Date().format('yyyyMMdd-HHmmss')}")
                logger.lifecycle("Backing up existing NeoForge saves to ${backup}")
                java.nio.file.Files.move(existing, backup.toPath())
            }
        }
        neoforgeSavesDir.parentFile.mkdirs()
        if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
            exec {
                commandLine 'cmd', '/c', 'mklink', '/J',
                        neoforgeSavesDir.absolutePath,
                        fabricSavesDir.absolutePath
            }
        } else {
            java.nio.file.Files.createSymbolicLink(
                    neoforgeSavesDir.toPath(),
                    fabricSavesDir.toPath())
        }
    }
}

tasks.matching { it.name == 'runClient' || it.name == 'runClientData' }
        .configureEach {
            dependsOn tasks.named('syncNeoForgeSavesWithFabric')
        }

processResources {
    inputs.property 'mod_id', project.mod_id
    inputs.property 'mod_name', 'Argus'
    inputs.property 'mod_version', project.mod_version
    inputs.property 'minecraft_version', project.minecraft_version
    inputs.property 'neo_version', project.neo_version
}

tasks.withType(JavaCompile).configureEach {
    options.release = project.java_release as int
    options.encoding = 'UTF-8'
}

def argusBenchmarkProperties = [
        'argus.benchmark',
        'argus.benchmark.autopilot',
        'argus.benchmark.autopilotTicks',
        'argus.benchmark.closeOnComplete',
        'argus.benchmark.closeDelayTicks',
        'argus.benchmark.world',
        'argus.benchmark.seed',
        'argus.benchmark.targetX',
        'argus.benchmark.targetY',
        'argus.benchmark.targetZ',
        'argus.benchmark.settleTicks',
        'argus.benchmark.lowFpsThreshold',
        'argus.benchmark.lowFpsSampleLimit',
        'argus.benchmark.ctmCandidateTop',
        'argus.benchmark.optionsFile',
        'argus.benchmark.configFile',
        'argus.benchmark.reportDir',
        'argus.benchmark.runLabel',
        'argus.sodium.modelEmitter.disabled',
]

def copyBenchmarkTemplate = { String source, File target ->
    if (source == null || source.isBlank()) {
        return
    }
    File requested = new File(source)
    File sourceFile = requested.isAbsolute()
            ? requested
            : rootProject.file(source)
    if (!sourceFile.isFile()) {
        throw new GradleException("Benchmark template does not exist: ${source}")
    }
    target.parentFile.mkdirs()
    java.nio.file.Files.copy(
            sourceFile.toPath(),
            target.toPath(),
            java.nio.file.StandardCopyOption.REPLACE_EXISTING)
    logger.lifecycle("Copied benchmark template ${sourceFile} -> ${target}")
}

tasks.withType(JavaExec).configureEach { task ->
    if (task.name == 'runClient') {
        systemProperty 'argus.benchmark.loader', 'neoforge'
        systemProperty 'argus.benchmark.loaderVersion', project.neo_version
        systemProperty 'argus.benchmark.modVersion', project.mod_version
        systemProperty 'argus.benchmark.minecraftVersion',
                project.minecraft_version
        if (System.getProperty('argus.benchmark.reportDir') == null) {
            systemProperty 'argus.benchmark.reportDir',
                    rootProject.file('build/argus-benchmark/reports')
                            .absolutePath
        }
        argusBenchmarkProperties.each { key ->
            def value = System.getProperty(key)
            if (value != null) {
                if (key == 'argus.benchmark.reportDir') {
                    File requested = new File(value)
                    systemProperty key, (requested.isAbsolute()
                            ? requested
                            : rootProject.file(value)).absolutePath
                } else {
                    systemProperty key, value
                }
            }
        }
        doFirst {
            copyBenchmarkTemplate(System.getProperty(
                    'argus.benchmark.optionsFile'), project.file('run/options.txt'))
            copyBenchmarkTemplate(System.getProperty(
                    'argus.benchmark.configFile'),
                    project.file('run/config/argus.properties'))
        }
    }
}

tasks.withType(Jar).configureEach {
    from(project(':src:shared').sourceSets.main.output)
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
